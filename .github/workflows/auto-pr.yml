name: Auto-create PR for claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR via Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash(gh pr:*)"
          prompt: |
            Create a pull request from branch `${{ github.ref_name }}` to `main` in the repository `${{ github.repository }}`.
            Use: gh pr create --base main --head "${{ github.ref_name }}" --title "${{ github.event.head_commit.message }}" --body "Automated PR."
            If the PR already exists, just report its number. Do not make any code changes.
