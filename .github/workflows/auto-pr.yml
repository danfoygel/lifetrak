name: Auto-create PR for claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if one doesn't exist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const title = context.payload.head_commit.message.split('\n')[0];

            // Check for existing open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open',
            });

            if (prs.length > 0) {
              console.log(`PR #${prs[0].number} already exists for branch ${branch}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: 'main',
              title: title,
              body: `Automated PR from branch \`${branch}\`.`,
            });
            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
