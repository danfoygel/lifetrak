name: Auto-create PR for claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if one doesn't exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -xe
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          echo "Repo: $GITHUB_REPOSITORY"

          # Check if a PR already exists for this branch using GitHub API directly
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pulls?head=${GITHUB_REPOSITORY%%/*}:$BRANCH&base=main&state=open" \
            | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')" 2>/dev/null || echo "")
          echo "Existing PR: '$EXISTING'"

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH"
          else
            TITLE=$(git log -1 --pretty=%s)
            echo "Creating PR with title: $TITLE"
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/pulls" \
              -d "{\"title\": \"$TITLE\", \"head\": \"$BRANCH\", \"base\": \"main\", \"body\": \"Automated PR from branch \\\`$BRANCH\\\`.\"}")
            echo "Response: $RESPONSE"
            echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('PR created:', d.get('html_url', d.get('message', 'unknown')))"
          fi
