name: Auto-create PR for claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          TITLE=$(git log -1 --pretty=%s)
          echo "Branch: $BRANCH, Title: $TITLE"

          # Check for existing open PR
          EXISTING=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" --base main --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated PR from branch \`$BRANCH\`."
          fi
