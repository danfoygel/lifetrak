name: Auto-create PR for claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH"
          else
            TITLE=$(git log -1 --pretty=%s)
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated PR from branch \`$BRANCH\`."
          fi
