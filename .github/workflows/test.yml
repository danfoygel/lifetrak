name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'lifetrak/**'
              - 'lifetrakTests/**'
              - 'lifetrakUITests/**'
              - 'lifetrak.xcodeproj/**'
              - '.github/workflows/test.yml'

  test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the branch by name (not a detached SHA) so we can push
          # back any newly-recorded reference snapshots.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Select Xcode
        id: xcode
        run: |
          # Find the latest Xcode that supports iOS 26 (the project's deployment target)
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          echo "version=$(xcodebuild -version | head -1 | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache SDK stat cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/SDKStatCaches.noindex
          key: ${{ runner.os }}-sdkstatcache-${{ steps.xcode.outputs.version }}

      - name: Test
        run: |
          _run_tests() {
            xcodebuild -scheme lifetrak \
              -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
              -only-testing:lifetrakTests \
              -skip-testing:lifetrakUITests \
              SWIFT_ENABLE_CODE_COVERAGE=NO \
              COMPILER_INDEX_STORE_ENABLE=NO \
              test
          }

          _run_tests || {
            # Tests failed — check if swift-snapshot-testing recorded new reference
            # images (first run after a reference is deleted or added).
            NEW=$(git ls-files --others --exclude-standard lifetrakTests/__Snapshots__/)
            if [ -z "$NEW" ]; then
              echo "Tests failed for reasons unrelated to snapshot recording."
              exit 1
            fi

            echo "New reference snapshots recorded:"
            echo "$NEW"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add lifetrakTests/__Snapshots__/
            git commit -m "Record reference snapshots on CI [skip ci]"
            git push

            echo "Snapshots committed — re-running tests."
            _run_tests
          }
