name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: xcodebuild -scheme lifetrak -destination 'platform=iOS Simulator,name=iPhone 16 Pro' build

      - name: Test
        run: xcodebuild -scheme lifetrak -destination 'platform=iOS Simulator,name=iPhone 16 Pro' -only-testing:lifetrakTests test
