name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Create iPhone 14 Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes | grep "iOS 18" | tail -1 | awk '{print $NF}')
          echo "Using runtime: $RUNTIME"
          xcrun simctl create "iPhone 14" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-14" \
            "$RUNTIME"

      - name: Build
        run: xcodebuild -scheme lifetrak -destination 'platform=iOS Simulator,name=iPhone 14' build

      - name: Test
        run: xcodebuild -scheme lifetrak -destination 'platform=iOS Simulator,name=iPhone 14' -only-testing:lifetrakTests test
